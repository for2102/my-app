<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>띄어쓰기 학습 놀이터</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Confetti Effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- html2canvas -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- Chosen Palette: Warm Retro Pop (Orange-50 Base) --- */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FFF7ED;
            /* Orange-50 */
            color: #1F2937;
            /* Gray-800 */
            overflow-x: hidden;
        }

        /* --- Retro Box Design --- */
        .retro-box {
            background-color: white;
            border: 3px solid #1F2937;
            box-shadow: 6px 6px 0px 0px #1F2937;
            border-radius: 1.5rem;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .retro-box:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px #1F2937;
        }

        .retro-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #1F2937;
        }

        /* --- Utilities --- */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        .icon-3d {
            filter: drop-shadow(3px 3px 0px rgba(0, 0, 0, 0.2));
        }

        /* --- Word Block & Interaction --- */
        .word-block {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background-color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            border: 3px solid #D1D5DB;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin: 0.35rem;
            font-size: 1.8rem;
            line-height: 1.6;
            font-weight: 700;
            transition: all 0.3s;
            cursor: default;
        }

        @media (max-width: 768px) {
            .word-block {
                font-size: 1.4rem;
                padding: 0.4rem 0.6rem;
            }
        }

        .word-block.correct {
            border-color: #22C55E;
            background-color: #F0FDF4;
            color: #15803D;
            box-shadow: 0 0 0 3px #BBF7D0;
        }

        .word-block.wrong {
            border-color: #EF4444;
            background-color: #FEF2F2;
            color: #B91C1C;
            animation: shake 0.5s;
        }

        /* --- Split Gap (The Clickable Space) --- */
        .split-gap {
            display: inline-block;
            width: 24px;
            height: 1.4em;
            margin: 0 -6px;
            vertical-align: middle;
            position: relative;
            cursor: pointer;
            z-index: 10;
        }

        .split-gap:hover::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 10%;
            height: 60%;
            width: 4px;
            background-color: #FB923C;
            /* Orange-400 */
            transform: translateX(-50%);
            border-radius: 4px;
            opacity: 0.8;
        }

        .split-gap:hover::before {
            content: '\f078';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #EA580C;
            /* Orange-600 */
            animation: bounce-mark 0.6s infinite alternate;
        }

        /* --- Selection States --- */
        .selected-card {
            border-color: #F97316 !important;
            background-color: #FFF7ED !important;
            transform: scale(1.03);
            box-shadow: 0 0 0 4px #FDBA74 !important;
        }

        .selected-emoji {
            transform: scale(1.2) rotate(10deg);
            filter: grayscale(0) !important;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* --- Wizard Animations --- */
        .feedback-step {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .feedback-step.active {
            display: flex;
            /* Changed to flex for centering */
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        @keyframes bounce-mark {
            from {
                transform: translateX(-50%) translateY(0);
            }

            to {
                transform: translateX(-50%) translateY(-6px);
            }
        }

        /* --- Certificate --- */
        .certificate-border {
            border: 8px double #F59E0B;
            padding: 2rem;
            background: radial-gradient(circle, #FFFFFF 0%, #FFF7ED 100%);
            position: relative;
        }

        .certificate-seal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #B45309;
            opacity: 0.2;
            font-size: 80px;
            transform: rotate(-15deg);
        }

        /* --- Chart Container --- */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            height: 200px;
        }

        /* --- Merge Gap (Clickable space between blocks) --- */
        .merge-gap {
            display: inline-block;
            width: 28px;
            height: 2rem;
            margin: 0 -4px;
            cursor: pointer;
            position: relative;
            z-index: 15;
            transition: all 0.2s;
        }

        .merge-gap:hover::after {
            content: '\f00d';
            /* xmark */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #EF4444;
            opacity: 0.7;
        }

        .merge-gap::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 50%;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <!-- 
    <!-- Application Structure Plan: 
         1. Intro Section: User configures learning path (Theme + Goal). Uses large cards for easy selection.
         2. Game Section: Main interactive area. Top dashboard for stats, middle for interaction (splitting blocks), bottom for controls.
         3. Feedback Modal: 3-Step Wizard triggered on error. 
            - Step 1: Visual comparison.
            - Step 2: Expert linguistic explanation.
            - Step 3: Interactive remediation (practice).
         4. Completion Section: Dashboard summary, Chart.js analytics, Certificate generation, Save/Export features.
    -->

    <!-- ========================= -->
    <!-- 1. Intro Screen           -->
    <!-- ========================= -->
    <section id="intro-screen"
        class="w-full max-w-4xl bg-white rounded-3xl p-8 retro-box text-center animate-fade-in-down z-20">
        <div class="mb-10">
            <div
                class="inline-block p-4 mb-4 rounded-full bg-yellow-300 border-3 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transform -rotate-3">
                <i class="fa-solid fa-shapes text-5xl text-orange-600 icon-3d"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-gray-800 mb-2 tracking-tight">
                띄어쓰기 <span class="text-orange-500">학습 놀이터</span>
            </h1>
            <p class="text-xl text-gray-600 font-medium">나만의 목표를 세우고 바른 글쓰기 습관을 길러요!</p>
        </div>

        <!-- Theme Selection -->
        <div class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center justify-center gap-3">
                <span
                    class="bg-gray-800 text-white w-8 h-8 rounded-full flex items-center justify-center text-lg shadow-md">1</span>
                어떤 이야기를 공부할까요?
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="selectTheme('school', this)"
                    class="theme-btn retro-box bg-white p-6 rounded-2xl hover:bg-orange-50 transition group selected-card"
                    data-theme="school">
                    <div class="text-5xl mb-3 group-hover:scale-110 transition-transform duration-300">🏫</div>
                    <div class="font-bold text-xl text-gray-800">학교 생활</div>
                    <div class="text-sm text-gray-500 mt-1">친구, 선생님, 수업</div>
                </button>
                <button onclick="selectTheme('animals', this)"
                    class="theme-btn retro-box bg-white p-6 rounded-2xl hover:bg-orange-50 transition group"
                    data-theme="animals">
                    <div class="text-5xl mb-3 group-hover:scale-110 transition-transform duration-300">🦁</div>
                    <div class="font-bold text-xl text-gray-800">동물 친구들</div>
                    <div class="text-sm text-gray-500 mt-1">자연, 곤충, 애완동물</div>
                </button>
                <button onclick="selectTheme('daily', this)"
                    class="theme-btn retro-box bg-white p-6 rounded-2xl hover:bg-orange-50 transition group"
                    data-theme="daily">
                    <div class="text-5xl mb-3 group-hover:scale-110 transition-transform duration-300">🎈</div>
                    <div class="font-bold text-xl text-gray-800">일상 이야기</div>
                    <div class="text-sm text-gray-500 mt-1">가족, 놀이, 날씨</div>
                </button>
            </div>
        </div>

        <!-- Goal Selection -->
        <div class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center justify-center gap-3">
                <span
                    class="bg-gray-800 text-white w-8 h-8 rounded-full flex items-center justify-center text-lg shadow-md">2</span>
                몇 문제를 도전할까요?
            </h2>
            <div class="flex justify-center gap-4 flex-wrap">
                <button onclick="selectCount(3, this)"
                    class="count-btn retro-box bg-white py-3 px-8 rounded-xl font-bold text-lg text-gray-700 hover:bg-gray-50 selected-card">3문제</button>
                <button onclick="selectCount(5, this)"
                    class="count-btn retro-box bg-white py-3 px-8 rounded-xl font-bold text-lg text-gray-700 hover:bg-gray-50">5문제</button>
                <button onclick="selectCount(10, this)"
                    class="count-btn retro-box bg-white py-3 px-8 rounded-xl font-bold text-lg text-gray-700 hover:bg-gray-50">10문제</button>
            </div>
        </div>

        <button onclick="startGame()"
            class="w-full md:w-auto bg-orange-500 hover:bg-orange-600 text-white font-black py-4 px-16 rounded-2xl text-2xl shadow-[4px_4px_0px_0px_rgba(154,52,18,1)] transition-transform active:translate-x-1 active:translate-y-1 active:shadow-none flex items-center justify-center gap-3 mx-auto">
            <i class="fa-solid fa-play"></i> 학습 시작하기
        </button>
    </section>

    <!-- ========================= -->
    <!-- 2. Game Screen            -->
    <!-- ========================= -->
    <section id="game-screen" class="hidden w-full flex flex-col items-center max-w-6xl">
        <!-- Header Info -->
        <header class="w-full mb-6 text-center">
            <div
                class="inline-flex items-center gap-4 bg-white px-8 py-3 rounded-full border-3 border-gray-800 shadow-md">
                <span id="theme-icon-display" class="text-2xl">🏫</span>
                <span id="theme-text-display" class="font-bold text-gray-800 text-lg">학교 생활</span>
                <span class="text-gray-300 mx-2">|</span>
                <span class="text-gray-600 font-bold">진행 상황: <span id="current-progress"
                        class="text-orange-600 text-xl">1</span> / <span id="total-goal">5</span></span>
            </div>
        </header>

        <!-- Main Game Box -->
        <main class="w-full bg-white rounded-3xl p-6 md:p-10 retro-box relative overflow-hidden">
            <!-- Decorative Elements -->
            <div
                class="absolute -top-12 -left-12 w-40 h-40 bg-yellow-200 rounded-full opacity-40 z-0 pointer-events-none blur-xl">
            </div>
            <div
                class="absolute -bottom-12 -right-12 w-48 h-48 bg-orange-200 rounded-full opacity-40 z-0 pointer-events-none blur-xl">
            </div>

            <!-- Progress Bar -->
            <div class="relative z-10 w-full bg-gray-100 rounded-full h-4 mb-8 overflow-hidden border border-gray-200">
                <div id="progress-bar"
                    class="bg-orange-400 h-full transition-all duration-700 ease-out shadow-[0_0_10px_rgba(251,146,60,0.5)]"
                    style="width: 0%"></div>
            </div>

            <!-- Instruction -->
            <div
                class="relative z-10 mb-8 bg-blue-50 border-2 border-blue-100 p-4 rounded-xl flex items-center justify-center text-center shadow-sm">
                <p class="text-gray-700 font-medium text-lg">
                    <span
                        class="bg-blue-500 text-white rounded-full w-8 h-8 inline-flex items-center justify-center text-sm mr-2 shadow-sm"><i
                            class="fa-solid fa-volume-high"></i></span>
                    문장을 소리 내어 읽고, <span
                        class="font-bold text-orange-600 bg-white px-2 py-1 rounded border border-orange-200 mx-1">∨</span>
                    부분을 눌러 띄어쓰기 하세요.
                </p>
            </div>

            <!-- Game Board (Interactive Area) -->
            <div id="game-board"
                class="relative z-10 min-h-[220px] bg-slate-50 border-4 border-dashed border-slate-300 rounded-2xl p-8 flex flex-wrap content-center justify-center gap-y-4 gap-x-2 mb-8 select-none transition-colors">
                <!-- Blocks generated by JS -->
            </div>

            <!-- Feedback & Answer Display -->
            <div class="relative z-10 min-h-[3rem] text-center mb-6">
                <div id="feedback-msg" class="text-2xl font-bold text-gray-700 hidden animate-bounce"></div>
                <div id="answer-display"
                    class="hidden mt-4 p-4 bg-green-50 border-2 border-green-400 rounded-xl inline-block shadow-sm">
                    <p class="text-sm text-green-700 font-bold mb-1"><i class="fa-solid fa-check-circle"></i> 정답 문장</p>
                    <p id="correct-text" class="text-2xl md:text-3xl font-bold text-green-800 tracking-tight"></p>
                </div>
            </div>

            <!-- Controls -->
            <div
                class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-4 border-t-2 border-gray-100 pt-8">
                <div class="flex gap-3 w-full md:w-auto">
                    <button id="btn-undo" onclick="undoLastAction()"
                        class="flex-1 md:flex-none bg-white border-2 border-gray-300 text-gray-600 font-bold py-3 px-6 rounded-xl hover:bg-gray-50 transition shadow-sm btn-disabled">
                        <i class="fa-solid fa-rotate-left mr-2"></i>취소
                    </button>
                    <button onclick="showIntro()"
                        class="flex-1 md:flex-none bg-white border-2 border-gray-300 text-gray-600 font-bold py-3 px-6 rounded-xl hover:bg-gray-50 transition shadow-sm">
                        <i class="fa-solid fa-home mr-2"></i>그만하기
                    </button>
                </div>

                <div class="flex gap-3 w-full md:w-auto">
                    <button id="btn-check" onclick="checkAnswer()"
                        class="flex-[2] md:flex-none bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-10 rounded-xl text-xl shadow-[0_4px_0_#c2410c] active:shadow-none active:translate-y-1 transition-all">
                        <i class="fa-solid fa-check mr-2"></i>정답 확인
                    </button>
                    <button id="btn-next" onclick="loadNextProblem()"
                        class="hidden flex-[2] md:flex-none bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-10 rounded-xl text-xl shadow-[0_4px_0_#15803d] active:shadow-none active:translate-y-1 transition-all">
                        다음 문제 <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </main>
    </section>

    <!-- ========================= -->
    <!-- 3. Feedback Modal (3-Step Wizard) -->
    <!-- ========================= -->
    <div id="result-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 hidden backdrop-blur-md p-4">
        <div
            class="bg-white rounded-[2rem] p-0 w-full max-w-4xl mx-auto retro-box modal-enter relative shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">

            <!-- Header -->
            <div class="bg-indigo-50 p-6 flex justify-between items-center border-b-2 border-indigo-100">
                <div class="flex items-center gap-3">
                    <div class="bg-white p-2 rounded-full border-2 border-indigo-200">
                        <i class="fa-solid fa-graduation-cap text-2xl text-indigo-500"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800 leading-none">선생님의 띄어쓰기 팁!</h3>
                        <p class="text-sm text-gray-500 mt-1">왜 틀렸는지 차근차근 알아봐요.</p>
                    </div>
                </div>
                <button onclick="closeModal()"
                    class="w-10 h-10 bg-white rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-800 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- Content Area (Dynamic) -->
            <div id="detailed-feedback" class="flex-1 overflow-y-auto p-6 bg-gray-50">
                <!-- Javascript will inject Steps 1, 2, 3 here -->
            </div>

            <!-- Navigation Footer -->
            <div class="bg-white p-4 border-t-2 border-gray-100 flex items-center justify-between">
                <button id="prev-feedback-btn" onclick="prevFeedbackStep()"
                    class="text-gray-500 hover:text-gray-800 font-bold px-4 py-2 rounded-lg hover:bg-gray-100 transition disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-chevron-left mr-2"></i> 이전
                </button>

                <!-- Step Indicator -->
                <div class="flex items-center gap-1">
                    <div id="step-dot-1" class="w-3 h-3 rounded-full bg-indigo-500 transition-all"></div>
                    <div id="step-dot-2" class="w-3 h-3 rounded-full bg-gray-300 transition-all"></div>
                </div>

                <button id="next-feedback-btn" onclick="nextFeedbackStep()"
                    class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold px-6 py-2 rounded-xl transition shadow-md flex items-center">
                    다음 <i class="fa-solid fa-chevron-right ml-2"></i>
                </button>

                <button id="finish-feedback-btn" onclick="retryCurrentProblem()"
                    class="bg-gray-800 hover:bg-gray-900 text-white font-bold px-6 py-2 rounded-xl transition shadow-lg hidden flex items-center">
                    <i class="fa-solid fa-pen-to-square mr-2"></i> 다시 고쳐보기
                </button>
            </div>
        </div>
    </div>

    <!-- ========================= -->
    <!-- 4. Completion Screen      -->
    <!-- ========================= -->
    <section id="completion-screen"
        class="hidden w-full max-w-3xl bg-white rounded-3xl p-8 retro-box text-center animate-fade-in-down z-20 overflow-y-auto max-h-[90vh]">

        <!-- Certificate Area -->
        <div id="certificate-area" class="certificate-border bg-white rounded-xl mb-8 relative">
            <i class="fa-solid fa-certificate certificate-seal"></i>
            <div class="mb-6">
                <div class="inline-block p-4 rounded-full bg-yellow-100 mb-2 border-4 border-yellow-300">
                    <i class="fa-solid fa-trophy text-5xl text-yellow-500 drop-shadow-md"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-800 mb-2">학습 완료 인증서</h2>
                <div id="badge-display" class="my-4 transform scale-110"></div>
                <p class="text-lg text-gray-600">
                    <span id="current-date" class="block text-sm text-gray-400 mb-2 font-mono"></span>
                    오늘 목표한 <span id="final-goal-count" class="font-bold text-orange-600 text-2xl">5</span>문제를 모두 끝마쳤습니다!
                </p>
            </div>

            <!-- Stats Chart -->
            <div class="chart-container mb-6">
                <canvas id="scoreChart"></canvas>
            </div>

            <!-- Wrong Answers Review -->
            <div id="review-section"
                class="hidden text-left bg-orange-50 border border-orange-200 rounded-xl p-5 mx-2 relative">
                <div class="font-bold text-orange-800 mb-3 border-b border-orange-200 pb-2 flex items-center">
                    <i class="fa-solid fa-pen-nib mr-2"></i> 복습 문장 (다시 한 번 읽어보세요)
                </div>
                <div id="wrong-sentences-list" class="notebook-paper text-lg text-gray-800 text-left"></div>
            </div>

            <div id="perfect-score-msg" class="hidden bg-green-50 border border-green-200 rounded-xl p-6 mx-2">
                <p class="text-2xl font-bold text-green-700 mb-2">
                    <i class="fa-solid fa-crown text-3xl mr-2"></i> 완벽해요!
                </p>
                <p class="text-green-800 font-medium">틀린 문제가 하나도 없어요. 띄어쓰기 실력이 대단해요!</p>
            </div>
        </div>

        <!-- Emotion Check -->
        <div class="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-200">
            <p class="text-lg font-bold text-gray-700 mb-4">오늘 공부는 어땠나요?</p>
            <div class="flex justify-center gap-8">
                <button
                    class="emoji-btn hover:scale-110 transition text-5xl grayscale hover:grayscale-0 flex flex-col items-center gap-2"
                    onclick="selectEmoji(this)">
                    <span>😄</span>
                    <span class="text-sm font-bold text-gray-500">재밌어요</span>
                </button>
                <button
                    class="emoji-btn hover:scale-110 transition text-5xl grayscale hover:grayscale-0 flex flex-col items-center gap-2"
                    onclick="selectEmoji(this)">
                    <span>😐</span>
                    <span class="text-sm font-bold text-gray-500">보통이에요</span>
                </button>
                <button
                    class="emoji-btn hover:scale-110 transition text-5xl grayscale hover:grayscale-0 flex flex-col items-center gap-2"
                    onclick="selectEmoji(this)">
                    <span>🤯</span>
                    <span class="text-sm font-bold text-gray-500">어려워요</span>
                </button>
            </div>
        </div>

        <!-- Actions -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <button onclick="saveLearningContent()"
                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-file-arrow-down"></i> 복습 문제 저장
            </button>

            class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-black py-4 px-8 rounded-xl text-xl shadow-[0_4px_0_#4338ca] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-2">

    <!-- JavaScript Implementation -->
    <script>
        /**
         * 띄어쓰기 학습 놀이터 Core Logic
         */

        // --- 1. Data Library ---
        const dataLibrary = {
            school: [
                "친구들이 운동장에서 공을 차고 있다.", "급식실에서 국을 쏟지 않으려고 조심했다.", "오늘 숙제는 일기 한 줄만 쓰면 된다.",
                "책상 위에 쌓인 책들을 차례대로 정리했다.", "쉬는 시간마다 친구들과 숨바꼭질을 한다.", "벽시계를 보니 벌써 점심시간이 다 되었다.",
                "오늘 체육 시간에는 줄넘기를 연습했다.", "친구가 도와준 덕분에 숙제를 빨리 끝낼 수 있었다.", "도서관에서는 속삭이듯 조용히 이야기해야 한다.",
                "선생님께서 우리에게 재미있는 책을 읽어 주셨다.", "짝꿍과 함께 당번 활동을 열심히 했다.", "필통 안에 지우개가 없어서 친구에게 빌렸다."
            ],
            animals: [
                "하늘에 떠 있는 구름이 동물처럼 보였다.", "멀리서부터 고양이 우는 소리가 들려왔다.", "토끼가 깡충깡충 뛰어서 숲속으로 사라졌다.",
                "강아지가 꼬리를 흔들며 나에게 다가왔다.", "참새들이 나뭇가지 위에 옹기종기 모여 있다.", "사자가 입을 크게 벌리고 하품을 했다.",
                "기린은 목이 길어서 높은 나무의 잎을 먹는다.", "다람쥐가 도토리를 입에 물고 바쁘게 움직인다.", "개구리가 연못 위 개구리밥 위에 앉아 있다.",
                "펭귄은 날지 못하지만 수영을 아주 잘한다.", "판다가 대나무 잎을 맛있게 씹어 먹고 있다."
            ],
            daily: [
                "바닥에 떨어진 연필을 주워 주었다.", "떨리는 마음으로 발표를 시작했다.", "오늘은 특히 바람이 세게 분다.",
                "가방 안에 숙제 공책을 넣어 두었다.", "우산을 안 가져와서 비를 맞았다.", "등굣길에 예쁜 무지개를 보았다.",
                "엄마가 끓여 준 미역국이 정말 맛있다.", "창문을 꼭 닫지 않아서 바람이 살짝 샜다.", "동생이 장난감을 정리하지 않고 그대로 두었다.",
                "버스에서 할머니께 자리를 양보해 드렸다.", "거울 속 얼굴이 피곤해 보였다.", "약속 시간에 늦지 않으려고 서둘러 나갔다.",
                "쓰레기를 아무 데나 버리면 안 된다.", "창가에 놓인 화분에 물을 조금씩 주었다.", "엄마는 늘 내 이야기를 끝까지 들어 주신다."
            ]
        };

        // Grammar Dictionaries
        const commonParticles = ["은", "는", "이", "가", "을", "를", "에", "에게", "의", "로", "으로", "도", "만", "까지", "부터", "서", "에서", "와", "과", "하고", "랑", "이랑", "이다", "입니다"];
        const dependentNouns = ["수", "것", "데", "바", "줄", "나름", "따름", "뿐", "만큼", "대로", "지", "적"];
        const compoundEndings = ["오다", "가다", "나다", "주다", "보다", "버리다", "왔다", "갔다", "났다", "줬다", "주었다", "봤다", "보았다", "버렸다", "야하다", "야한다", "준", "줄", "줘"];

        // State Management
        let currentSettings = { theme: 'school', goalCount: 3, currentProblemIndex: 0, solvedFirstCount: 0, solvedRetryCount: 0 };
        let currentSentenceData = [];
        let blocks = [];
        let historyStack = [];
        let isChecked = false;
        let isFirstAttempt = true;
        let correctSentence = "";
        let noSpaceSentence = "";
        let correctTokens = [];
        let wrongHistory = []; // Stores { wrong: string, correct: string }

        // Wizard State
        let currentFeedbackStep = 1;
        const totalFeedbackSteps = 2;
        let practiceBlocks = [];
        let practiceQ = "";
        let practiceA = "";

        // Chart Instance
        let chartInstance = null;

        // --- 2. Initialization ---
        window.onload = function () { showIntro(); };

        function showIntro() {
            document.getElementById('intro-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('completion-screen').classList.add('hidden');

            // Reset Stats
            currentSettings.solvedFirstCount = 0;
            currentSettings.solvedRetryCount = 0;
            currentSettings.currentProblemIndex = 0;
            wrongHistory = [];
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected-emoji'));
        }

        // --- 3. Settings & Navigation ---
        function selectTheme(theme, btnElement) {
            currentSettings.theme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('selected-card'));
            btnElement.classList.add('selected-card');
        }

        function selectCount(count, btnElement) {
            currentSettings.goalCount = count;
            document.querySelectorAll('.count-btn').forEach(btn => btn.classList.remove('selected-card'));
            btnElement.classList.add('selected-card');
        }

        function selectEmoji(btnElement) {
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected-emoji'));
            btnElement.classList.add('selected-emoji');
        }

        function startGame() {
            // Data Prep: Shuffle and Slice
            let pool = [...dataLibrary[currentSettings.theme]];
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            currentSentenceData = pool.slice(0, Math.min(pool.length, currentSettings.goalCount));
            currentSettings.goalCount = currentSentenceData.length;

            // UI Switch
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            // Header Update
            const icons = { school: '🏫', animals: '🦁', daily: '🎈' };
            const texts = { school: '학교 생활', animals: '동물 친구들', daily: '일상 이야기' };
            document.getElementById('theme-icon-display').innerText = icons[currentSettings.theme];
            document.getElementById('theme-text-display').innerText = texts[currentSettings.theme];
            document.getElementById('total-goal').innerText = currentSettings.goalCount;

            loadProblem(0);
        }

        // --- 4. Game Logic ---
        function loadProblem(index) {
            currentSettings.currentProblemIndex = index;
            updateProgressUI();

            const sentence = currentSentenceData[index];
            correctSentence = sentence;
            noSpaceSentence = sentence.replace(/ /g, '');
            correctTokens = sentence.split(' ');

            initGameBoard();
        }

        function initGameBoard() {
            blocks = [noSpaceSentence]; // Start as one big block
            historyStack = [];
            isChecked = false;

            document.getElementById('feedback-msg').classList.add('hidden');
            document.getElementById('answer-display').classList.add('hidden');

            const btnCheck = document.getElementById('btn-check');
            const btnNext = document.getElementById('btn-next');
            btnCheck.classList.remove('hidden');
            btnNext.classList.add('hidden');

            updateUndoButtonState();
            renderBlocks();
        }

        function updateProgressUI() {
            const index = currentSettings.currentProblemIndex + 1;
            const total = currentSettings.goalCount;
            const percent = ((index - 1) / total) * 100; // Progress based on attempts

            document.getElementById('current-progress').innerText = index;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function renderBlocks() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.innerHTML = '';

            blocks.forEach((blockText, blockIndex) => {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'word-block';

                const chars = blockText.split('');
                chars.forEach((char, charIndex) => {
                    const charSpan = document.createElement('span');
                    charSpan.textContent = char;
                    blockDiv.appendChild(charSpan);

                    // Add split gap unless it's the last char
                    if (charIndex < chars.length - 1) {
                        const gapSpan = document.createElement('span');
                        gapSpan.className = 'split-gap';
                        gapSpan.title = "여기를 눌러 띄어쓰기";

                        if (!isChecked) {
                            gapSpan.onclick = (e) => {
                                e.stopPropagation();
                                splitBlock(blockIndex, charIndex);
                            };
                        } else {
                            gapSpan.style.cursor = 'not-allowed';
                            gapSpan.style.pointerEvents = 'none';
                        }
                        blockDiv.appendChild(gapSpan);
                    }
                });
                gameBoard.appendChild(blockDiv);

                // Add merge gap between blocks
                if (blockIndex < blocks.length - 1) {
                    const mergeGap = document.createElement('div');
                    mergeGap.className = 'merge-gap';
                    mergeGap.title = "띄어쓰기 취소";
                    if (!isChecked) {
                        mergeGap.onclick = (e) => {
                            e.stopPropagation();
                            mergeBlocks(blockIndex);
                        };
                    }
                    gameBoard.appendChild(mergeGap);
                }
            });
        }

        function mergeBlocks(blockIndex) {
            if (isChecked) return;
            historyStack.push([...blocks]);
            const leftPart = blocks[blockIndex];
            const rightPart = blocks[blockIndex + 1];
            blocks.splice(blockIndex, 2, leftPart + rightPart);
            renderBlocks();
            updateUndoButtonState();
        }

        function splitBlock(blockIndex, splitIndex) {
            historyStack.push([...blocks]);

            const currentText = blocks[blockIndex];
            const leftPart = currentText.slice(0, splitIndex + 1);
            const rightPart = currentText.slice(splitIndex + 1);

            blocks.splice(blockIndex, 1, leftPart, rightPart);
            renderBlocks();
            updateUndoButtonState();
        }

        function undoLastAction() {
            if (isChecked || historyStack.length === 0) return;
            blocks = historyStack.pop();
            renderBlocks();
            updateUndoButtonState();
        }

        function updateUndoButtonState() {
            const btnUndo = document.getElementById('btn-undo');
            if (historyStack.length === 0 || isChecked) {
                btnUndo.classList.add('btn-disabled');
                btnUndo.disabled = true;
            } else {
                btnUndo.classList.remove('btn-disabled');
                btnUndo.disabled = false;
            }
        }

        function getBlockRanges(tokenArray) {
            let currentIndex = 0;
            return tokenArray.map(token => {
                const start = currentIndex;
                const end = start + token.length;
                currentIndex = end;
                return { text: token, start, end };
            });
        }

        function checkAnswer() {
            if (isChecked) return;
            isChecked = true;
            updateUndoButtonState();

            const userRanges = getBlockRanges(blocks);
            const correctRanges = getBlockRanges(correctTokens);
            let correctCount = 0;
            const totalCount = correctTokens.length;

            // Visual marking
            const blockElements = document.querySelectorAll('.word-block');
            userRanges.forEach((uRange, index) => {
                const isMatch = correctRanges.some(cRange =>
                    cRange.start === uRange.start && cRange.end === uRange.end && cRange.text === uRange.text
                );
                if (isMatch) {
                    blockElements[index].classList.add('correct');
                    correctCount++;
                } else {
                    blockElements[index].classList.add('wrong');
                }
            });

            const isPerfect = (correctCount === totalCount && blocks.length === totalCount);

            // UI Updates
            const btnCheck = document.getElementById('btn-check');
            const btnNext = document.getElementById('btn-next');
            btnCheck.classList.add('hidden');
            btnNext.classList.remove('hidden');

            const feedbackMsg = document.getElementById('feedback-msg');
            feedbackMsg.classList.remove('hidden');

            if (isPerfect) {
                if (isFirstAttempt) {
                    currentSettings.solvedFirstCount++;
                } else {
                    currentSettings.solvedRetryCount++;
                }
                feedbackMsg.innerHTML = `<span class="text-green-600"><i class="fa-solid fa-star text-yellow-400"></i> 참 잘했어요! 정답입니다.</span>`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 100 });
                // Show Correct Answer
                document.getElementById('correct-text').innerText = correctSentence;
                document.getElementById('answer-display').classList.remove('hidden');
            } else {
                feedbackMsg.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> 아쉬워요! 다시 확인해볼까요?</span>`;

                if (isFirstAttempt) {
                    const userSentence = blocks.join(' ');
                    // Record wrong attempt and correct version
                    if (!wrongHistory.some(h => h.correct === correctSentence)) {
                        wrongHistory.push({ wrong: userSentence, correct: correctSentence });
                    }
                    isFirstAttempt = false;
                }

                // Trigger Expert Feedback
                setTimeout(() => analyzeAndShowModal(), 800);
            }
        }

        function retryCurrentProblem() {
            closeModal();
            // Reset for retry
            isChecked = false;
            document.getElementById('feedback-msg').classList.add('hidden');
            document.getElementById('answer-display').classList.add('hidden');

            // Buttons
            document.getElementById('btn-check').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');

            // Keep blocks as they were (wrong state) but remove coloring classes
            renderBlocks();
            updateUndoButtonState();
        }

        function loadNextProblem() {
            const nextIndex = currentSettings.currentProblemIndex + 1;
            if (nextIndex >= currentSettings.goalCount) {
                showCompletion();
            } else {
                loadProblem(nextIndex);
            }
        }

        // --- 5. Expert Feedback System (The 3-Step Wizard) ---
        function analyzeAndShowModal() {
            // Logic to find WHAT went wrong
            const userRanges = getBlockRanges(blocks);
            const correctRanges = getBlockRanges(correctTokens);

            let mismatchType = "unknown";
            let wrongText = blocks.join(' ');

            // Simple heuristic: compare block counts
            // More blocks than correct = Over-split. Fewer = Under-split.
            // For a robust system, we check the first mismatch.
            let firstMismatchIndex = -1;

            // This logic finds the specific segment for specialized feedback
            // Simplification: We will pass the full context but tailor text based on detected pattern

            // Detect specific patterns in the CORRECT sentence to trigger specific advice
            const cleanCorrect = correctSentence.replace(/[. ]/g, '');

            // Check patterns in the raw correct text
            let feedbackData = getFeedbackContent(cleanCorrect, correctSentence, wrongText);

            // Render Wizard HTML
            const modalContent = document.getElementById('detailed-feedback');
            modalContent.innerHTML = generateWizardHTML(wrongText, correctSentence, feedbackData);

            // Initialize Wizard State
            currentFeedbackStep = 1;
            updateFeedbackStepUI();

            // Setup Practice Mode Data
            practiceQ = feedbackData.practiceQ; // The unspaced correct segment
            practiceA = feedbackData.practiceA; // The spaced correct segment
            practiceBlocks = [practiceQ]; // Init as one block

            document.getElementById('result-modal').classList.remove('hidden');
        }

        function getFeedbackContent(cleanText, correctText, wrongText) {
            // Default Fallback
            let result = {
                why: `단어와 단어 사이는 띄어 써야 해요.<br>각각의 뜻을 가진 낱말을 찾아보세요.`,
                practiceQ: correctText.replace(/ /g, ''),
                practiceA: correctText
            };

            // 1. Negation (~지 않다/못하다)
            if (cleanText.includes("지않") || cleanText.includes("지못")) {
                result.why = `이 말에는 두 가지 뜻이 담겨 있어요.<br><br>👉 <span class="bg-blue-100 px-2 py-1 rounded font-bold">~지</span> (상태) + <span class="bg-blue-100 px-2 py-1 rounded font-bold">않다/못하다</span> (부정)<br>각각 뜻을 가진 말은 띄어 써야 해요.`;
                // Extract the segment for practice if possible, otherwise use full sentence
                const match = correctText.match(/\S+지 (않|못)\S+/);
                if (match) {
                    result.practiceA = match[0];
                    result.practiceQ = match[0].replace(/ /g, '');
                }
            }
            // 2. Auxiliary Verbs (주다 / derived verbs)
            else if (cleanText.includes("어주") || cleanText.includes("아주") || cleanText.includes("해주")) {
                result.why = `‘~어 주다’는 본용언과 보조 용언이 만난 구성이에요.<br>원칙적으로는 띄어 쓰지만, 붙여 쓰는 것도 허용돼요.<br>우리는 <strong>원칙대로 띄어 쓰는 연습</strong>을 해봐요!`;
                const match = correctText.match(/\S+(어|아|해) 주\S+/);
                if (match) {
                    result.practiceA = match[0];
                    result.practiceQ = match[0].replace(/ /g, '');
                }
            }
            // 3. Dependent Nouns (수, 것...)
            else if (dependentNouns.some(n => cleanText.includes("을" + n) || cleanText.includes("는" + n) || cleanText.includes("할" + n))) {
                const foundNoun = dependentNouns.find(n => cleanText.includes(n));
                result.why = `여기서 ‘<span class="text-green-600 font-bold">${foundNoun}</span>’은(는) 의존 명사예요.<br>의존 명사도 엄연한 단어이기 때문에 앞말과 띄어 써야 해요.`;
                // Find specific part for practice
                const regex = new RegExp(`\\S+ (?:${dependentNouns.join('|')})\\S*`);
                const match = correctText.match(regex);
                if (match) {
                    result.practiceA = match[0];
                    result.practiceQ = match[0].replace(/ /g, '');
                }
            }
            // 4. Particles (Checking if user split a particle)
            // This is harder to detect solely from text without NLP, 
            // so we assume if user added MORE spaces than needed, it might be a particle error.
            else if (wrongText.split(' ').length > correctText.split(' ').length) {
                result.why = `조사(은,는,이,가,을,를...)는 앞말에 딱 붙여 써야 해요.<br>조사는 혼자서는 쓰일 수 없거든요.`;
            }

            return result;
        }

        function generateWizardHTML(wrongText, correctText, feedbackData) {
            // Visual mark for correct text
            const correctVisual = correctText.replace(/ /g, '<span class="text-orange-500 mx-1 font-black">∨</span>');

            return `
                <!-- Step 1 -->
                <div id="feedback-step-1" class="feedback-step active h-full flex flex-col justify-center items-center gap-6">
                    <div class="grid grid-cols-2 gap-4 w-full">
                        <div class="bg-white border-2 border-red-200 p-4 rounded-xl text-center shadow-sm">
                            <span class="block text-xs font-bold text-red-500 mb-2">❌ 내가 쓴 문장</span>
                            <span class="text-xl md:text-2xl font-bold text-gray-800 break-keep">${wrongText}</span>
                        </div>
                        <div class="bg-white border-2 border-green-200 p-4 rounded-xl text-center shadow-sm">
                            <span class="block text-xs font-bold text-green-600 mb-2">✅ 바른 띄어쓰기</span>
                            <span class="text-xl md:text-2xl font-bold text-gray-800 break-keep">${correctVisual}</span>
                        </div>
                    </div>
                </div>

                <!-- Step 2 -->
                <div id="feedback-step-2" class="feedback-step h-full flex flex-col justify-center items-center gap-6">
                    <div class="text-center">
                        <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-bold mb-2 inline-block">실전 연습</span>
                        <p class="text-gray-600 text-lg">틀린 부분을 바르게 고쳐보세요!</p>
                    </div>
                    
                    <!-- Practice Board -->
                    <div id="practice-board" class="flex flex-wrap justify-center gap-2 p-6 bg-gray-100 border-2 border-gray-200 rounded-2xl select-none min-h-[100px] items-center w-full max-w-2xl">
                        <!-- Injected by renderPracticeBlocks -->
                    </div>

                    <div class="h-8 text-center" id="practice-result"></div>

                    <button id="practice-check-btn" onclick="checkPracticeAnswer()" class="bg-green-500 hover:bg-green-600 text-white font-bold px-8 py-3 rounded-xl text-lg shadow-md transition transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        정답 확인하기
                    </button>
                </div>
            `;
        }

        // --- Wizard Navigation ---
        function updateFeedbackStepUI() {
            // Hide all
            for (let i = 1; i <= totalFeedbackSteps; i++) {
                const el = document.getElementById(`feedback-step-${i}`);
                const dot = document.getElementById(`step-dot-${i}`);
                if (el) {
                    el.classList.remove('active');
                    el.style.display = 'none';
                }
                if (dot) {
                    dot.classList.remove('bg-indigo-500');
                    dot.classList.add('bg-gray-300');
                }
            }
            // Show current
            const currentEl = document.getElementById(`feedback-step-${currentFeedbackStep}`);
            const currentDot = document.getElementById(`step-dot-${currentFeedbackStep}`);
            if (currentEl) {
                currentEl.style.display = 'flex'; // Use flex for centering logic in CSS
                setTimeout(() => currentEl.classList.add('active'), 10);
            }
            if (currentDot) {
                currentDot.classList.remove('bg-gray-300');
                currentDot.classList.add('bg-indigo-500');
            }

            // Buttons
            document.getElementById('prev-feedback-btn').disabled = (currentFeedbackStep === 1);

            const nextBtn = document.getElementById('next-feedback-btn');
            const finishBtn = document.getElementById('finish-feedback-btn');

            if (currentFeedbackStep === totalFeedbackSteps) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
                renderPracticeBlocks(); // Init practice board on step 3
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }
        }

        function nextFeedbackStep() {
            if (currentFeedbackStep < totalFeedbackSteps) {
                currentFeedbackStep++;
                updateFeedbackStepUI();
            }
        }

        function prevFeedbackStep() {
            if (currentFeedbackStep > 1) {
                currentFeedbackStep--;
                updateFeedbackStepUI();
            }
        }

        function closeModal() {
            document.getElementById('result-modal').classList.add('hidden');
        }

        // --- Practice Mode Logic (Inside Modal) ---
        function renderPracticeBlocks() {
            const board = document.getElementById('practice-board');
            if (!board) return;
            board.innerHTML = '';

            practiceBlocks.forEach((text, bIndex) => {
                const div = document.createElement('div');
                // Use same style as game blocks but slightly different styling context if needed
                div.className = 'word-block practice-block';
                div.style.cursor = 'default';

                const chars = text.split('');
                chars.forEach((char, cIndex) => {
                    const span = document.createElement('span');
                    span.textContent = char;
                    div.appendChild(span);

                    if (cIndex < chars.length - 1) {
                        const gap = document.createElement('span');
                        gap.className = 'split-gap';
                        gap.onclick = (e) => {
                            e.stopPropagation();
                            splitPracticeBlock(bIndex, cIndex);
                        };
                        div.appendChild(gap);
                    }
                });
                board.appendChild(div);

                // Add merge gap for practice
                if (bIndex < practiceBlocks.length - 1) {
                    const mGap = document.createElement('div');
                    mGap.className = 'merge-gap';
                    mGap.onclick = (e) => {
                        e.stopPropagation();
                        mergePracticeBlocks(bIndex);
                    };
                    board.appendChild(mGap);
                }
            });
        }

        function mergePracticeBlocks(bIndex) {
            const left = practiceBlocks[bIndex];
            const right = practiceBlocks[bIndex + 1];
            practiceBlocks.splice(bIndex, 2, left + right);
            renderPracticeBlocks();
        }

        function splitPracticeBlock(bIndex, cIndex) {
            const text = practiceBlocks[bIndex];
            const left = text.slice(0, cIndex + 1);
            const right = text.slice(cIndex + 1);
            practiceBlocks.splice(bIndex, 1, left, right);
            renderPracticeBlocks();
        }

        function checkPracticeAnswer() {
            const userAttempt = practiceBlocks.join(' ');
            const resultDiv = document.getElementById('practice-result');

            if (userAttempt === practiceA) {
                resultDiv.innerHTML = `<span class="text-green-600 font-bold"><i class="fa-solid fa-check"></i> 정답입니다!</span>`;
                confetti({
                    particleCount: 100,
                    spread: 60,
                    origin: { y: 0.7 },
                    zIndex: 9999
                });
                document.querySelectorAll('#practice-board .word-block').forEach(el => el.classList.add('correct'));
                document.getElementById('practice-check-btn').disabled = true;
                document.getElementById('practice-check-btn').classList.add('opacity-50');
            } else {
                resultDiv.innerHTML = `<span class="text-red-500 font-bold">아직 아니에요. 다시 시도해보세요.</span>`;
                document.querySelectorAll('#practice-board .word-block').forEach(el => el.classList.add('wrong'));
                setTimeout(() => {
                    document.querySelectorAll('#practice-board .word-block').forEach(el => el.classList.remove('wrong'));
                }, 500);
            }
        }

        // --- 6. Completion & Export ---
        function showCompletion() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
            document.getElementById('final-goal-count').innerText = currentSettings.goalCount;

            // Date
            const d = new Date();
            document.getElementById('current-date').innerText = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`;

            // Badge
            const score = currentSettings.solvedFirstCount + currentSettings.solvedRetryCount;
            const total = currentSettings.goalCount;
            const ratio = score / total;
            let badgeHtml = '';

            if (ratio === 1) {
                badgeHtml = `<div class="inline-flex flex-col items-center"><i class="fa-solid fa-crown text-6xl text-yellow-500 mb-2"></i><span class="text-2xl font-black text-yellow-600">띄어쓰기 달인</span></div>`;
                // Only show perfect score message if ALL were solved on first attempt
                if (currentSettings.solvedFirstCount === total) {
                    document.getElementById('perfect-score-msg').classList.remove('hidden');
                } else {
                    document.getElementById('perfect-score-msg').classList.add('hidden');
                }
            } else if (ratio >= 0.6) {
                badgeHtml = `<div class="inline-flex flex-col items-center"><i class="fa-solid fa-tree text-6xl text-green-500 mb-2"></i><span class="text-2xl font-black text-green-600">띄어쓰기 박사</span></div>`;
                document.getElementById('perfect-score-msg').classList.add('hidden');
            } else {
                badgeHtml = `<div class="inline-flex flex-col items-center"><i class="fa-solid fa-seedling text-6xl text-blue-500 mb-2"></i><span class="text-2xl font-black text-blue-600">띄어쓰기 새싹</span></div>`;
                document.getElementById('perfect-score-msg').classList.add('hidden');
            }
            document.getElementById('badge-display').innerHTML = badgeHtml;

            // Render Wrong List
            const listContainer = document.getElementById('wrong-sentences-list');
            const reviewSection = document.getElementById('review-section');
            listContainer.innerHTML = '';

            if (wrongHistory.length > 0) {
                reviewSection.classList.remove('hidden');
                wrongHistory.forEach((item, i) => {
                    const p = document.createElement('div');
                    p.className = "border-b border-orange-200 py-4";
                    p.innerHTML = `
                        <div class="font-bold text-orange-500 mb-1">${i + 1}. 복습 문장</div>
                        <div class="text-sm text-red-500 mb-1">❌ 처음 쓴 문장: ${item.wrong}</div>
                        <div class="font-bold text-green-600">✅ 바른 띄어쓰기: ${item.correct}</div>
                    `;
                    listContainer.appendChild(p);
                });
            } else {
                reviewSection.classList.add('hidden');
            }

            // Chart.js Visualization
            const wrongCount = total - (currentSettings.solvedFirstCount + currentSettings.solvedRetryCount);
            renderChart(currentSettings.solvedFirstCount, currentSettings.solvedRetryCount, wrongCount);
        }

        function renderChart(firstMatch, retryMatch, wrong) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['맞은 문제', '재도전 맞은 문제', '틀린 문제'],
                    datasets: [{
                        data: [firstMatch, retryMatch, wrong],
                        backgroundColor: ['#22C55E', '#FACC15', '#EF4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function saveLearningContent() {
            let content = `[띄어쓰기 학습 결과]\n날짜: ${new Date().toLocaleDateString()}\n`;
            content += `주제: ${currentSettings.theme}\n`;
            content += `점수: ${currentSettings.solvedFirstCount + currentSettings.solvedRetryCount} / ${currentSettings.goalCount}\n`;
            content += `(처음 맞음: ${currentSettings.solvedFirstCount}, 재도전 맞음: ${currentSettings.solvedRetryCount})\n\n`;

            if (wrongHistory.length > 0) {
                content += `[복습 문장]\n`;
                wrongHistory.forEach((item, i) => {
                    content += `${i + 1}. 복습 문장\n`;
                    content += `   ❌ 처음 쓴 문장: ${item.wrong}\n`;
                    content += `   ✅ 바른 띄어쓰기: ${item.correct}\n\n`;
                });
            } else {
                content += `틀린 문제가 없습니다. 훌륭해요!\n`;
            }

            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "띄어쓰기_학습기록.txt";
            link.click();
        }

        function captureScreen() {
            const element = document.getElementById('certificate-area');
            html2canvas(element).then(canvas => {
                const link = document.createElement('a');
                link.download = '띄어쓰기_인증서.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

    </script>
</body>
